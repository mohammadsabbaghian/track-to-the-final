@font-face{font-family:'Pretendard';src:url('../Templates/Luc/Fonts/Pretendard/PretendardVariable.ttf') format('truetype');font-weight:100 900;font-display:swap}
:root{
 --midnight:#1F2024; --mid-2:#26282d; --mid-3:#2d2f35;
 --royal:#0039B5; --royal-500:#406BC8; --royal-300:#8CA6DE;
 --marine:#12275B;
 --ivory:#FFFDF7; --white:#fff;
 --line:rgba(140,166,222,.30); --line-2:rgba(255,255,255,.09);
 --txt:#EDEEF0; --mut:#9A9CA1; --mut2:#6f7177;
 --good:#3ad07f; --warn:#e7b14c; --bad:#e06262;
 --sans:'Pretendard Variable','Pretendard','Segoe UI',-apple-system,'Helvetica Neue',Arial,sans-serif;
 --disp:'Kurdis','Pretendard',sans-serif;
 --serif:'NotoSerifI',Georgia,serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--midnight);color:var(--txt);font-family:var(--sans);
 -webkit-font-smoothing:antialiased;line-height:1.5;position:relative;overflow-x:hidden}
body::before{content:"";position:fixed;inset:-20% -10%;z-index:0;pointer-events:none;
 background:
  radial-gradient(40% 32% at 78% 6%, rgba(0,57,181,.50), transparent 70%),
  radial-gradient(46% 40% at 12% 52%, rgba(0,57,181,.34), transparent 72%),
  radial-gradient(50% 44% at 92% 84%, rgba(18,39,91,.60), transparent 72%),
  radial-gradient(38% 30% at 50% 120%, rgba(0,57,181,.26), transparent 70%);
 filter:blur(20px) saturate(115%);}
.wrap{position:relative;z-index:1;max-width:1740px;margin:0 auto;padding:48px 48px 70px}
.wm{height:28px;color:var(--white);display:block}
.chev{height:1em;color:var(--royal-500);display:inline-block;vertical-align:middle}
a{color:var(--royal-300)}
::selection{background:var(--royal);color:#fff}

/* masthead */
.top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:30px;gap:20px}
.top .meta{text-align:right;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut)}
.top .meta .ser{font-family:var(--serif);font-size:14px;letter-spacing:0;text-transform:none;color:var(--royal-300);display:block;margin-bottom:3px}
.statusdot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--good);margin-right:6px;box-shadow:0 0 0 3px rgba(58,208,127,.18)}
.hero{display:grid;grid-template-columns:1fr auto;gap:30px;align-items:end;border-bottom:1px solid var(--line-2);padding-bottom:26px}
.eyebrow{font-family:var(--serif);font-size:18px;color:var(--royal-300);margin:0 0 8px}
h1.title{font-family:var(--disp);font-weight:800;text-transform:uppercase;letter-spacing:-.01em;font-size:92px;line-height:.92;margin:0;color:var(--white)}
h1.title em{font-style:normal;color:var(--royal-500)}
.lede{margin:16px 0 0;font-size:15px;color:var(--mut);max-width:640px}
.lede b{color:var(--txt);font-weight:600}
.heroR{display:flex;flex-direction:column;gap:10px;align-items:flex-end;text-align:right}
.bigstat{font-family:var(--serif);font-size:74px;line-height:.8;color:var(--white)}
.bigstat small{font-family:var(--sans);font-style:normal;font-size:11.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--mut);display:block;margin-top:10px;line-height:1.5}

/* control bar */
.controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:22px 0 6px;
 padding:12px 14px;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.015));
 border:1px solid var(--line-2);border-radius:14px;position:sticky;top:0;z-index:20;backdrop-filter:blur(10px)}
.controls .lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut2);margin-right:2px}
.actors{display:flex;gap:6px;background:rgba(0,0,0,.25);border:1px solid var(--line-2);border-radius:10px;padding:4px}
.actor{font-size:13px;font-weight:600;color:var(--mut);padding:7px 14px;border-radius:7px;cursor:pointer;border:0;background:transparent;font-family:var(--sans)}
.actor:hover{color:var(--txt)}
.actor.on{background:var(--royal);color:#fff}
.actor.adm.on{background:var(--marine);color:#fff;box-shadow:inset 0 0 0 1px var(--royal-500)}
.spacer{flex:1}
.btn{font-size:12px;font-weight:600;color:var(--txt);background:rgba(255,255,255,.06);border:1px solid var(--line-2);
 border-radius:8px;padding:8px 13px;cursor:pointer;font-family:var(--sans)}
.btn:hover{background:rgba(255,255,255,.11)}
.btn.pri{background:var(--royal);border-color:var(--royal);color:#fff}
.btn.pri:hover{background:#0042d6}
.btn.ghost{background:transparent}
.youare{font-size:12px;color:var(--mut);margin:10px 2px 0}
.youare b{color:var(--royal-300)}
.syncpill{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:600;letter-spacing:.04em;
 color:var(--mut);background:rgba(255,255,255,.05);border:1px solid var(--line-2);border-radius:20px;padding:6px 12px}
.syncpill .dot{width:8px;height:8px;border-radius:50%;background:var(--mut2)}
.syncpill.on{color:#bfe9cf;border-color:rgba(58,208,127,.4)}
.syncpill.on .dot{background:var(--good);box-shadow:0 0 0 3px rgba(58,208,127,.16)}
.syncpill.err{color:#f0c2c2;border-color:rgba(224,98,98,.4)}.syncpill.err .dot{background:var(--bad)}

/* section heading */
.sec{margin-top:54px}
.sechead{display:flex;align-items:baseline;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.sechead .no{font-family:var(--serif);font-size:28px;color:var(--royal-300)}
.sechead h2{font-family:var(--disp);font-weight:800;text-transform:uppercase;letter-spacing:-.01em;font-size:38px;line-height:1;margin:0;color:var(--white)}
.sechead .note{margin-left:auto;font-size:12.5px;color:var(--mut);max-width:460px;text-align:right;line-height:1.45}

/* leaderboard */
.board{background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.015));border:1px solid var(--line-2);border-radius:16px;padding:20px 22px}
.board h3{font-family:var(--disp);font-weight:800;text-transform:uppercase;font-size:20px;color:#fff;margin:0 0 4px;letter-spacing:-.01em}
.board .sub{font-size:11.5px;color:var(--mut2);margin-bottom:14px}
.lbrow{display:grid;grid-template-columns:26px 1fr auto auto auto;gap:16px;align-items:center;padding:12px 0;border-top:1px solid rgba(255,255,255,.07);font-size:14px}
.lbrow.h{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut2);border-top:0;padding-bottom:4px}
.lbrow .rk{font-family:var(--serif);font-size:18px;color:var(--mut2);text-align:center}
.lbrow.p1 .rk{color:var(--royal-300)}
.lbrow .pn{color:#fff;font-weight:600}
.lbrow .pn .me{font-size:10px;color:var(--royal-300);margin-left:6px;letter-spacing:.1em;text-transform:uppercase}
.lbrow .v{font-variant-numeric:tabular-nums;color:var(--txt);text-align:right;min-width:34px}
.lbrow .tot{font-weight:700;color:var(--royal-300);font-size:16px}
.lbbar{height:4px;border-radius:3px;background:linear-gradient(90deg,var(--royal-500),var(--royal-300));margin-top:2px}

/* group platforms */
.platforms{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.plat{background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.014));border:1px solid var(--line-2);border-radius:14px;overflow:hidden}
.plat .ph{display:flex;align-items:center;gap:9px;padding:11px 14px;border-bottom:1px solid var(--line-2);background:rgba(0,57,181,.10)}
.plat .ph .ptag{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--royal-300);font-weight:600}
.plat .ph .pl{font-family:var(--disp);font-weight:800;font-size:22px;color:var(--white);line-height:1}
.plat .ph .chev{height:12px;margin-left:auto}
.prow{display:grid;grid-template-columns:16px 44px 1fr auto auto;align-items:center;gap:9px;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px}
.prow:last-child{border-bottom:0}
.prow .pos{font-family:var(--serif);font-size:14px;color:var(--mut2);text-align:center}
.prow .cd{font-weight:700;font-size:10.5px;color:var(--txt);background:rgba(255,255,255,.06);border:1px solid var(--line-2);border-radius:6px;padding:3px 0;text-align:center}
.prow .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt)}
.prow .gp{font-size:10.5px;color:var(--mut2);font-variant-numeric:tabular-nums}
.prow .pt{font-weight:700;font-size:13px;font-variant-numeric:tabular-nums;min-width:16px;text-align:right}
.prow.dep{background:linear-gradient(90deg,rgba(0,57,181,.20),rgba(0,57,181,.04))}
.prow.dep .cd{background:var(--royal);border-color:var(--royal);color:#fff}
.prow.dep .pos{color:var(--royal-300)}
.prow.dep .nm{color:#fff;font-weight:600}
.plat .pf{padding:9px 14px;font-size:10px;letter-spacing:.04em;color:var(--mut2);display:flex;justify-content:space-between}
.plat .pf .dep{color:var(--royal-300)}

/* fixtures */
.filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.chip{font-size:12px;font-weight:600;color:var(--mut);background:rgba(255,255,255,.05);border:1px solid var(--line-2);border-radius:20px;padding:6px 13px;cursor:pointer;font-family:var(--sans)}
.chip:hover{color:var(--txt)}
.chip.on{background:var(--royal);border-color:var(--royal);color:#fff}
.mdblock{margin-bottom:8px}
.mdh{display:flex;align-items:center;gap:10px;margin:18px 0 8px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut2)}
.mdh::after{content:"";flex:1;height:1px;background:var(--line-2)}
.frow{display:grid;grid-template-columns:30px 1fr 150px 1fr 132px;gap:10px;align-items:center;
 padding:9px 14px;border:1px solid var(--line-2);border-radius:11px;margin-bottom:7px;
 background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.008));font-size:13.5px}
.frow.locked{opacity:.92}
.frow.mine{box-shadow:inset 3px 0 0 var(--royal-500)}
.frow .fnum{font-family:var(--serif);font-size:13px;color:var(--mut2);text-align:center}
.fteam{display:flex;align-items:center;gap:9px;min-width:0}
.fteam.away{justify-content:flex-end;text-align:right}
.fteam .cd{font-weight:700;font-size:10.5px;color:var(--txt);background:rgba(255,255,255,.07);border:1px solid var(--line-2);border-radius:5px;padding:3px 6px}
.fteam .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt)}
.fteam.tbd .nm{color:var(--mut2);font-style:italic}
.fmid{display:flex;align-items:center;justify-content:center;gap:6px}
.sc{width:40px;height:34px;text-align:center;font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;
 color:#fff;background:rgba(0,0,0,.30);border:1px solid var(--line);border-radius:8px;font-family:var(--sans)}
.sc:focus{outline:0;border-color:var(--royal-500);background:rgba(0,57,181,.16)}
.sc.res{border-color:rgba(58,208,127,.5);background:rgba(58,208,127,.08)}
.sc:disabled{opacity:.5;cursor:not-allowed}
.fmid .dash{color:var(--mut2);font-weight:700}
.fmid .reslab{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut2);width:100%;text-align:center;margin-bottom:-2px}
.fend{text-align:right;font-size:11.5px;color:var(--mut)}
.fend .res{font-weight:700;color:var(--good);font-variant-numeric:tabular-nums}
.fend .pend{color:var(--mut2);font-style:italic}
.fend .pts{display:inline-block;min-width:20px;text-align:center;font-weight:700;border-radius:6px;padding:2px 7px;margin-left:6px;font-variant-numeric:tabular-nums}
.pts.x5{background:rgba(58,208,127,.18);color:var(--good)}
.pts.x3{background:rgba(64,107,200,.22);color:var(--royal-300)}
.pts.x2{background:rgba(231,177,76,.16);color:var(--warn)}
.pts.x0{background:rgba(224,98,98,.13);color:var(--bad)}
.fpreds{grid-column:1/-1;display:flex;gap:14px;flex-wrap:wrap;padding:6px 4px 2px 40px;font-size:11.5px;color:var(--mut)}
.fpreds .pp{display:inline-flex;gap:5px;align-items:center}
.fpreds .pp b{color:var(--txt);font-weight:600}
.fpreds .pp .mini{font-variant-numeric:tabular-nums;color:var(--mut2)}
.koteam{display:flex;gap:6px;align-items:center}
.koteam input{width:100%;height:30px;background:rgba(0,0,0,.3);border:1px solid var(--line);border-radius:7px;color:#fff;padding:0 8px;font-family:var(--sans);font-size:12.5px}
.koteam input:focus{outline:0;border-color:var(--royal-500)}
.fend .pend.lock{color:var(--warn)}
.fpreds.admeta{align-items:center;gap:18px;color:var(--mut2)}
.kolabel{display:inline-flex;align-items:center;gap:8px;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase}
.koin{height:28px;background:rgba(0,0,0,.3);border:1px solid var(--line-2);border-radius:6px;color:var(--txt);
 font-family:var(--sans);font-size:12px;padding:0 7px;color-scheme:dark}
.koin:focus{outline:0;border-color:var(--royal-500)}
.penbox{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;color:var(--mut)}
.penbtn{font-family:var(--sans);font-size:11px;font-weight:700;color:var(--txt);background:rgba(255,255,255,.06);
 border:1px solid var(--line-2);border-radius:6px;padding:4px 9px;cursor:pointer}
.penbtn:hover{background:rgba(255,255,255,.12)}
.penbtn.on{background:var(--royal);border-color:var(--royal);color:#fff}

/* knockout bracket */
.koheads{position:relative;height:40px;margin:6px auto 14px}
.koh{position:absolute;top:0}
.koh .rn{display:block;font-size:12.5px;letter-spacing:.04em;color:#fff;font-weight:600}
.koh .rs{display:block;font-family:var(--serif);font-size:11px;color:var(--mut2);margin-top:2px}
.kowrap{position:relative;border:1px solid var(--line-2);border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,.006));padding:26px 28px 30px;overflow-x:auto}
.bracket{position:relative;margin:0 auto}
.bracket svg.tracks{position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
.tie{position:absolute;z-index:1;background:rgba(31,33,38,.92);border:1px solid var(--line-2);border-radius:9px;overflow:hidden}
.tie .s{display:flex;align-items:center;gap:8px;padding:6px 9px;font-size:11.5px;color:var(--mut)}
.tie .s+.s{border-top:1px solid rgba(255,255,255,.05)}
.tie .s .d{width:7px;height:7px;border-radius:50%;border:1.5px solid var(--royal-500);flex:none}
.tie .s.win{color:#fff;font-weight:600}.tie .s.win .d{background:var(--royal-500)}
.tie .s .cc{font-weight:700;font-size:10px;color:var(--mut2)}
.tie .tl{position:absolute;top:-9px;left:9px;font-family:var(--serif);font-size:11px;color:var(--mut2);background:var(--midnight);padding:0 6px}
.koterm{position:absolute;z-index:2;border-radius:14px;border:1px solid rgba(140,166,222,.45);background:linear-gradient(160deg,rgba(0,57,181,.30),rgba(18,39,91,.55));padding:16px 18px;text-align:center}
.koterm .k{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--royal-300);font-weight:600}
.koterm .trophy{font-size:28px;margin:5px 0 2px}
.koterm .ch{font-family:var(--disp);font-weight:800;text-transform:uppercase;font-size:18px;color:#fff;letter-spacing:-.01em}
.koterm .plate{margin-top:8px;font-size:12px;color:var(--mut);font-family:var(--serif)}
.koterm .when{margin-top:4px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut2)}
.tpmark{position:absolute;z-index:2;border:1px dashed var(--line);border-radius:9px;background:rgba(255,255,255,.02);padding:8px 10px;text-align:center}
.tpmark .k{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut2)}
.tpmark .v{font-size:11px;color:var(--mut);font-family:var(--serif);margin-top:3px}
.kocap{margin-top:16px;font-size:12px;color:var(--mut);display:flex;align-items:center;gap:9px}
.kocap .chev{height:12px}

/* drivers / bonus */
.grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;align-items:start}
.drivers{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.ticket{background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.015));border:1px solid var(--line-2);border-radius:14px;padding:15px 16px;position:relative;overflow:hidden}
.ticket::after{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--royal-500),var(--marine))}
.ticket.mine{border-color:var(--royal-500)}
.ticket .th{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ticket .nm{font-family:var(--disp);font-weight:800;text-transform:uppercase;font-size:20px;color:#fff;letter-spacing:-.01em}
.ticket .rl{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--mut2)}
.pick{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid rgba(255,255,255,.06)}
.pick .lab{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut2);width:90px;line-height:1.35}
.pick select{flex:1;height:32px;background:rgba(0,0,0,.3);border:1px solid var(--line);border-radius:7px;color:#fff;padding:0 8px;font-family:var(--sans);font-size:13px}
.pick select:disabled{opacity:.7}
.pick select:focus{outline:0;border-color:var(--royal-500)}
.pick .bp{font-variant-numeric:tabular-nums;font-weight:700;color:var(--royal-300);min-width:26px;text-align:right}
.pick.win .lab{color:var(--royal-300)}

.fares{margin-top:16px}
.farerow{display:flex;align-items:center;gap:12px;padding:8px 0;border-top:1px solid rgba(255,255,255,.07);font-size:12.5px;color:var(--mut)}
.farerow .pp{font-weight:700;color:var(--royal-300);font-variant-numeric:tabular-nums;width:30px}
.farerow .chev{height:10px}
.help{font-size:12px;color:var(--mut);line-height:1.6;margin-top:10px}
.help code{background:rgba(255,255,255,.07);border-radius:4px;padding:1px 6px;color:var(--txt);font-size:11.5px}

/* footer */
.foot{margin-top:56px;padding-top:24px;border-top:1px solid var(--line-2);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px}
.foot .l{display:flex;align-items:center;gap:13px}
.foot .l .chev{height:19px;color:var(--white)}
.foot .tag{font-family:var(--disp);font-weight:800;text-transform:uppercase;font-size:15px;color:#fff;letter-spacing:-.01em}
.foot .r{text-align:right;font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--mut)}
.foot .r .fine{letter-spacing:0;text-transform:none;color:var(--mut2);font-size:11px;margin-top:4px}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:50;background:var(--marine);
 border:1px solid var(--royal-500);color:#fff;font-size:13px;font-weight:600;padding:11px 18px;border-radius:10px;
 box-shadow:0 12px 40px -12px rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
@media print{.controls{position:static}.sc:disabled{opacity:1}}
</style></head>

<script>/* Vireo World Cup 2026 — The Track to the Final : prediction game engine */

  if(sp===so) return S.cfg.out;
  return 0;
}
function winnerOf(m){ const r=parse(realOf(m)); if(!r) return null; const [H,A]=r, [h,a]=teamsOf(m);
  if(H>A) return h; if(A>H) return a;
  if(m.stage!=="group" && S.pens && S.pens[m.id]) return S.pens[m.id]==="home"?h:a;  // shoot-out
  return null; }
function mById(id){ return D.matches.find(m=>m.id===+id); }

/* ---- knockout auto-seed + auto-advance ---- */
const R32_TPL=[[73,'1A','2C'],[74,'1B','2D'],[75,'1E','2G'],[76,'1F','2H'],
 [77,'1I','2K'],[78,'1J','2L'],[79,'1C','2A'],[80,'1D','2B'],
 [81,'1G','2E'],[82,'1H','2F'],[83,'1K','2I'],[84,'1L','2J'],
 [85,'T0','T1'],[86,'T2','T3'],[87,'T4','T5'],[88,'T6','T7']];
function qualifiers(){
  const st=standings(); const firsts={}, seconds={}, thirds=[];
  Object.keys(st).sort().forEach(g=>{ const r=st[g];
    if(r[0]) firsts[g]=r[0].name; if(r[1]) seconds[g]=r[1].name;
    if(r[2]) thirds.push(Object.assign({grp:g}, r[2])); });
  thirds.sort((a,b)=> b.Pts-a.Pts || (b.GF-b.GA)-(a.GF-a.GA) || b.GF-a.GF || a.name.localeCompare(b.name));
  return {firsts, seconds, thirds:thirds.slice(0,8)};
}
function resolvePos(pos,q){ if(pos[0]==='1') return q.firsts[pos[1]]||""; if(pos[0]==='2') return q.seconds[pos[1]]||"";
  const t=q.thirds[+pos.slice(1)]; return t? t.name : ""; }
function groupComplete(){ return D.matches.filter(m=>m.stage==="group").every(m=>realOf(m)); }
function autoSeed(){
  const q=qualifiers();
  R32_TPL.forEach(([id,ph,pa])=>{ S.ko[String(id)]={home:resolvePos(ph,q), away:resolvePos(pa,q)}; });
  recomputeKO();
}
function parentSlot(id){ id=+id;
  if(id>=73&&id<=88) return [89+((id-73)>>1), (id-73)%2?'away':'home'];
  if(id>=89&&id<=96) return [97+((id-89)>>1), (id-89)%2?'away':'home'];
  if(id>=97&&id<=100) return [101+((id-97)>>1), (id-97)%2?'away':'home'];
  return null;
}
function recomputeKO(){
  for(let id=89; id<=104; id++) delete S.ko[String(id)];        // rebuild R16..Final from R32 results
  for(let id=73; id<=100; id++){ const w=winnerOf(mById(id)); if(!w) continue;
    const ps=parentSlot(id); if(!ps) continue; const o=S.ko[String(ps[0])]=S.ko[String(ps[0])]||{}; o[ps[1]]=w; }
  [101,102].forEach(id=>{ const m=mById(id); const w=winnerOf(m); if(!w) return; const [h,a]=teamsOf(m); const l=(w===h)?a:h;
    const slot=id===101?'home':'away';
    (S.ko["104"]=S.ko["104"]||{})[slot]=w; (S.ko["103"]=S.ko["103"]||{})[slot]=l; });
}
function rankOf(t){ return S.ranks[t]!=null? S.ranks[t] : 99; }
function udWeight(t){ const rk=rankOf(t); for(const [hi,w] of S.cfg.udTiers){ if(rk<=hi) return w; } return 0; }
function stageReached(team){
  if(!team) return 0;
  let best=0; const lvl={R32:1,R16:2,QF:3,SF:4,F:5};
  D.matches.forEach(m=>{ if(m.stage==="group"||m.stage==="P3") return;
    const [h,a]=teamsOf(m); if(team&&(h===team||a===team)){ const L=lvl[m.stage]||0; if(L>best) best=L; if(m.stage==="F"&&winnerOf(m)===team) best=6; } });
  return best;
}
const STAGE_LABEL = ["group stage","Round of 32","Round of 16","quarter-finals","semi-finals","final","CHAMPION"];
function champion(){ const f=D.matches.find(m=>m.stage==="F"); return f? winnerOf(f):null; }
function bonusBreak(p){
  const b=S.bonus[p]||{}; let champ=0, ud=0;
  if(b.champion && champion() && b.champion===champion()) champ=S.cfg.champ;
  if(b.underdog) ud = stageReached(b.underdog)*udWeight(b.underdog);
  return {champ, ud, total:champ+ud};
}
function matchPts(p){ let t=0; D.matches.forEach(m=>{ const s=scoreOne(predOf(p,m),realOf(m)); if(s!=null) t+=s; }); return t; }
function totals(){
  const rows=D.players.map(p=>{ const mp=matchPts(p), bb=bonusBreak(p); return {p,match:mp,bonus:bb.total,bb,tot:mp+bb.total}; });
  rows.sort((a,b)=> b.tot-a.tot || b.match-a.match || a.p.localeCompare(b.p));
  return rows;
}
function standings(){
  const G={};
  D.matches.filter(m=>m.stage==="group").forEach(m=>{
    G[m.grp]=G[m.grp]||{};
    [m.home,m.away].forEach(t=>{ if(!G[m.grp][t]) G[m.grp][t]={name:t,P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0}; });
    const r=parse(realOf(m)); if(!r) return; const [H,A]=r, hh=G[m.grp][m.home], aa=G[m.grp][m.away];
    hh.P++;aa.P++;hh.GF+=H;hh.GA+=A;aa.GF+=A;aa.GA+=H;
    if(H>A){hh.W++;aa.L++;hh.Pts+=3;} else if(A>H){aa.W++;hh.L++;aa.Pts+=3;} else {hh.D++;aa.D++;hh.Pts++;aa.Pts++;}
  });
  const out={};
  Object.keys(G).sort().forEach(g=>{ out[g]=Object.values(G[g]).sort((x,y)=> y.Pts-x.Pts || (y.GF-y.GA)-(x.GF-x.GA) || y.GF-x.GF || x.name.localeCompare(y.name)); });
  return out;
}

      <div class="pick win"><span class="lab">Final<br>destination</span><select data-bp="${esc(p)}" data-k="champion" ${dis}>${opts(b.champion)}</select><span class="bp">${bb.champ||0}</span></div>
      <div class="pick"><span class="lab">Longshot<br>(underdog)</span><select data-bp="${esc(p)}" data-k="underdog" ${dis}>${opts(b.underdog)}</select><span class="bp">${bb.ud||0}</span></div>
      <div class="help" style="margin-top:8px">${b.underdog?`${esc(b.underdog)} · rank #${rankOf(b.underdog)} · weight ×${udWeight(b.underdog)} · reached ${udStage} → <b style="color:var(--royal-300)">${bb.ud} pts</b>`:'pick a lowly-ranked side that could run deep'}</div>
    </div>`;
  }).join("") + `</div>`;
}

function renderSide(){
  const c=S.cfg;
  $("#side").innerHTML = `
   <div class="board fares"><h3>Fare Rules</h3><div class="sub">Kicktipp scoring · highest tier that applies, per fixture</div>
     <div class="farerow">${CH()}<span class="pp">${c.exact}</span><span>Exact score — you nailed the board</span></div>
     <div class="farerow">${CH()}<span class="pp">${c.gd}</span><span>Correct goal difference (right winner, right margin)</span></div>
     <div class="farerow">${CH()}<span class="pp">${c.out}</span><span>Correct result — win, draw or loss</span></div>
     <div class="farerow" style="color:var(--mut2)"><span class="pp" style="color:var(--mut2)">0</span><span>Wrong outcome</span></div>
     <div class="help">Tournament bonuses · <b>Champion</b> = +${c.champ} if your pick lifts it. <b>Longshot</b> = stage reached (R32=1 … champion=6) × ranking weight
       (#1–10 ×0, #11–20 ×1, #21–32 ×2, #33–42 ×3, #43–48 ×4). A #45 side in the quarters (3×4=12) beats a #12 side in the semis (4×1=4).</div>
   </div>
   <div class="board fares"><h3>How it runs</h3><div class="sub">${SYNC.on?'shared live · everyone on one board':'offline · saved to this browser'}</div>
     <div class="help">1 · Pick <b>who you are</b> top-left and type scorelines — use <b>Needs my pick</b> to see only what's still open.<br>
       2 · A prediction <b>locks at kick-off</b>; anything you locked in beforehand still scores once the result lands.<br>
       3 · <b>Admin</b> types results; when the groups finish, <b>Seed knockout</b> fills the R32 and winners auto-advance.<br>
       4 · ${SYNC.on?'Everyone shares one live board — no exporting needed.':'<b>Export</b> to merge picks, or add the Firebase config for a shared live board.'}</div>
   </div>`;
}

/* ---------------- interaction ---------------- */
let saveT=null;
function commit(rerender){ save(); if(rerender) render(); }
function toast(msg){ let t=$(".toast"); if(!t){ t=el(`<div class="toast"></div>`); document.body.appendChild(t);} t.textContent=msg; t.classList.add("show"); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),1600); }

function setPredPart(p,mid,side,val){
  const cur=parse((S.preds[p]||{})[mid])||["",""]; const idx=side==="h"?0:1; cur[idx]=val;
  if(cur[0]!=="" && cur[1]!==""){ S.preds[p]=S.preds[p]||{}; S.preds[p][mid]=cur[0]+"-"+cur[1]; }
  else { if(S.preds[p]) delete S.preds[p][mid]; }
}
function setResPart(mid,side,val){
  const cur=parse(S.results[mid])||["",""]; cur[side==="h"?0:1]=val;
  if(cur[0]!=="" && cur[1]!=="") S.results[mid]=cur[0]+"-"+cur[1]; else delete S.results[mid];
}

function bind(){
  const app=$("#app");
  app.addEventListener("click", e=>{
    const act=e.target.closest("[data-act]"); if(act){ VIEW=act.dataset.act; render(); return; }
    const f=e.target.closest("[data-f]"); if(f){ FILTER=f.dataset.f; renderFilters(); renderFixtures(); return; }
    if(e.target.id==="exp") return doExport();
    if(e.target.id==="imp"){ $("#impf").click(); return; }
    if(e.target.id==="reset"){ if(confirm(SYNC.on?"Reset the shared pool for everyone?":"Reset all predictions, results and bonuses on this device?")){ S=defState(); pushAll(); commit(true); toast("Reset"); } return; }
    if(e.target.id==="demo"){ if(confirm("Load sample predictions for everyone? (overwrites current picks)")){ seedDemo(); pushAll(); commit(true); toast("Sample loaded"); } return; }
    if(e.target.id==="share"){ const u=location.href.split("#")[0]; (navigator.clipboard?navigator.clipboard.writeText(u):Promise.reject()).then(()=>toast("Link copied")).catch(()=>prompt("Copy the link:",u)); return; }
    if(e.target.id==="seedko"){ const q=qualifiers(); const n=Object.keys(q.firsts).length;
      if(!groupComplete() && !confirm("The group stage isn't finished — seed the Round of 32 from the current standings anyway? You can adjust any junction afterwards.")) return;
      autoSeed(); save(); pushField("ko", S.ko); commit(true); toast("Knockout seeded"); return; }
    const pen=e.target.closest("[data-kind=pen]");
    if(pen){ const mid=pen.dataset.mid, side=pen.dataset.side; S.pens[mid]= (S.pens[mid]===side)? "" : side;
      recomputeKO(); save(); pushField("pens", S.pens); pushField("ko", S.ko); renderBoard(); renderBracket(); renderDrivers(); renderFixtures(); return; }
  });
  app.addEventListener("change", e=>{
    const t=e.target; const mid=t.dataset.mid, kind=t.dataset.kind, side=t.dataset.side;
    if(t.id==="impf"){ doImport(e); return; }
    if(t.dataset.bp){ const who=t.dataset.bp; S.bonus[who][t.dataset.k]=t.value; save(); pushField("bonus."+who, S.bonus[who]); renderBoard(); renderDrivers(); renderBracket(); return; }
    if(!mid) return;
    if(kind==="kick"){ if(t.value) S.kickoff[mid]=t.value; else delete S.kickoff[mid]; save(); pushField("kickoff", S.kickoff); return; }
    if(kind==="ko"){ const k=S.ko[mid]=S.ko[mid]||{}; k[side]=t.value; save(); pushField("ko", S.ko); renderBracket();
      if(k.home && k.away) renderFixtures(); return; }
    if(kind==="pred" || kind==="res"){
      const clampStr = x => x===""? "" : String(Math.max(0,Math.min(29,parseInt(x,10)||0)));
      t.value = clampStr(t.value);                 // read BOTH boxes from the DOM, not from stored state
      const hI=$(`input[data-mid="${mid}"][data-kind="${kind}"][data-side="h"]`);
      const aI=$(`input[data-mid="${mid}"][data-kind="${kind}"][data-side="a"]`);
      const hh=clampStr(hI?hI.value:""), aa=clampStr(aI?aI.value:"");
      const val = (hh!=="" && aa!=="") ? hh+"-"+aa : "";
      if(kind==="pred"){
        S.preds[VIEW]=S.preds[VIEW]||{}; if(val) S.preds[VIEW][mid]=val; else delete S.preds[VIEW][mid];
        save(); pushField("preds."+VIEW, S.preds[VIEW]); renderBoard(); /* no list rebuild: keep focus */
      } else {
        if(val) S.results[mid]=val; else delete S.results[mid];
        const m=mById(mid); const isKO = m && m.stage!=='group';
        if(isKO) recomputeKO();          // advance winners before saving
        save();
        pushField("results", S.results); if(isKO) pushField("ko", S.ko);
        renderBoard(); renderPlatforms(); renderBracket(); renderDrivers();
        if(val) renderFixtures(); /* rebuild once result complete, to preserve focus */
      }
    }
  });
}

function doExport(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const u=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=u; a.download="vireo-worldcup-2026.json"; a.click(); URL.revokeObjectURL(u); toast("Exported");
}
function doImport(e){
  const f=e.target.files[0]; if(!f) return; const rd=new FileReader();
  rd.onload=()=>{ try{ const r=JSON.parse(rd.result); S=migrate(r); pushAll(); commit(true); toast("Imported"); }catch(err){ alert("Could not read that file."); } };
  rd.readAsText(f); e.target.value="";
}

function seedDemo(){
  const rng=(seed=>()=>(seed=(seed*1103515245+12345)&0x7fffffff)/0x7fffffff)(7);
  D.players.forEach(p=>{ D.matches.forEach(m=>{ if(m.stage!=="group" || realOf(m)) return;
    const h=Math.floor(rng()*4), a=Math.floor(rng()*3); S.preds[p][m.id]=h+"-"+a; }); });
  [["33","2-2"],["34","3-1"],["35","1-1"],["36","0-2"],["37","2-1"]].forEach(([id,r])=>{ S.results[id]=r; });
}

/* boot */
render();
bind();          // delegated listeners attach once to the stable #app element
initSync();
})();
</script>
</body></html>
